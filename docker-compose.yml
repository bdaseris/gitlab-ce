services:
  gitlab:
    # Upgrade path GitLab : 18.5.1 -> 18.11.x (dernier) -> 19.2.0
    # Étape intermédiaire obligatoire ; passer à 19.2.0-ce.0 une fois que
    # l'instance 18.11.7 est démarrée et que les migrations sont terminées
    image: gitlab/gitlab-ce:18.11.7-ce.0
    # image: gitlab/gitlab-ce:19.2.0-ce.0
    hostname: 'gitlab.local'
    # hostname: 'gitlab.securit.fr'
    ports:
      - "2222:22"
      - "80:80"
      - "443:443"
    volumes:
      - ${GITLAB_HOME}/data:/var/opt/gitlab
      - ${GITLAB_HOME}/logs:/var/log/gitlab
      - ${GITLAB_HOME}/config:/etc/gitlab
    environment:
      GITLAB_OMNIBUS_CONFIG: "from_file('/omnibus_config.rb')"
      SMTP_ADDRESS: ${SMTP_ADDRESS}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER_NAME: ${SMTP_USER_NAME}
      SMTP_DOMAIN: ${SMTP_DOMAIN}
    configs:
      - source: gitlab
        target: /omnibus_config.rb
    secrets:
      - gitlab_root_password
      - gitlab_smtp_password
    networks:
      - gitlab-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s
      rollback_config:
        parallelism: 1
        delay: 10s

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/ || exit 1"]
      # test: ["CMD-SHELL", "curl -k https://localhost/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  gitlab-runner:
    image: gitlab/gitlab-runner:alpine
    deploy:
      mode: replicated
      replicas: 4
    networks:
      - gitlab-network

configs:
  gitlab:
    file: ./docker/gitlab/gitlab.rb
    # Nom versionné par hash : les configs Swarm étant immuables, chaque
    # modification de gitlab.rb doit créer une config au nom différent
    name: gitlab_conf_${GITLAB_CONFIG_HASH:-manual}

secrets:
  gitlab_root_password:
    external: true
  gitlab_smtp_password:
    external: true

networks:
  gitlab-network:
    driver: overlay