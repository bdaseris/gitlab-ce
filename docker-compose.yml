services:
  gitlab:
    image: gitlab/gitlab-ce:19.2.0-ce.0
    # Hostname Docker = nom d'hôte seul (pas une URL)
    hostname: ${GITLAB_HOSTNAME}
    ports:
      - "2222:22"
      - "80:80"
      - "443:443"
    volumes:
      - ${GITLAB_HOME}/data:/var/opt/gitlab
      - ${GITLAB_HOME}/logs:/var/log/gitlab
      - ${GITLAB_HOME}/config:/etc/gitlab
    environment:
      GITLAB_OMNIBUS_CONFIG: "from_file('/omnibus_config.rb')"
      # Lu par gitlab.rb via ENV['...']
      GITLAB_EXTERNAL_URL: ${GITLAB_EXTERNAL_URL}
      SMTP_ADDRESS: ${SMTP_ADDRESS}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER_NAME: ${SMTP_USER_NAME}
      SMTP_DOMAIN: ${SMTP_DOMAIN}
    configs:
      - source: gitlab
        target: /omnibus_config.rb
    secrets:
      - gitlab_root_password
      - gitlab_smtp_password
    networks:
      gitlab-network:
        # permet aux runners de joindre l'instance via le hostname
        aliases:
          - ${GITLAB_HOSTNAME}
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s
      rollback_config:
        parallelism: 1
        delay: 10s

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  gitlab-runner:
    image: gitlab/gitlab-runner:alpine
    # S'enregistre automatiquement au démarrage auprès de l'instance GitLab
    # avec le token du secret gitlab_runner_token (créé via l'UI admin).
    # Les jobs tournent avec l'executor docker (socket Docker de l'hôte) ;
    # GITLAB_HOSTNAME est résolu dans les containers de job via extra-hosts.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        if ! grep -q '\[\[runners\]\]' /etc/gitlab-runner/config.toml 2>/dev/null; then
          gitlab-runner register --non-interactive \
            --url "${GITLAB_EXTERNAL_URL}" \
            --token "$$(cat /run/secrets/gitlab_runner_token)" \
            --executor docker \
            --docker-image alpine:latest \
            --docker-extra-hosts "${GITLAB_HOSTNAME}:${GITLAB_HOST_IP}"
        fi
        exec /usr/bin/dumb-init /entrypoint run
    environment:
      GITLAB_EXTERNAL_URL: ${GITLAB_EXTERNAL_URL}
      GITLAB_HOSTNAME: ${GITLAB_HOSTNAME}
      GITLAB_HOST_IP: ${GITLAB_HOST_IP}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    secrets:
      - gitlab_runner_token
    deploy:
      mode: replicated
      replicas: 4
    networks:
      - gitlab-network

configs:
  gitlab:
    file: ./docker/gitlab/gitlab.rb
    # Nom versionné par hash : les configs Swarm étant immuables, chaque
    # modification de gitlab.rb doit créer une config au nom différent
    name: gitlab_conf_${GITLAB_CONFIG_HASH:-manual}

secrets:
  gitlab_root_password:
    external: true
  gitlab_smtp_password:
    external: true
  gitlab_runner_token:
    external: true

networks:
  gitlab-network:
    driver: overlay
